document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n  pointer-events: none;\n}\n\n/* ---------- nav ---------- */\n.nav-links { display: flex; gap: 32px; align-items: center; }\n.nav-link {\n  color: var(--text-on-dark-muted);\n  font-size: 14px;\n  text-decoration: none;\n  font-family: var(--font-outfit);\n  transition: color 0.2s;\n}\n.nav-link:hover { color: var(--text-on-dark); }\n.nav-cta {\n  background: var(--amber);\n  color: var(--amber-ink);\n  padding: 10px 20px;\n  border-radius: 999px;\n  font-size: 13px;\n  font-weight: 700;\n  text-decoration: none;\n  white-space: nowrap;\n  font-family: var(--font-outfit);\n  transition: transform 0.2s, filter 0.2s;\n}\n.nav-cta:hover { transform: translateY(-1px); filter: brightness(1.05); }\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero {\n  position: relative;\n  height: 300vh;\n  background: var(--bg-teal);\n}\n.hero-sticky {\n  position: sticky;\n  top: 0;\n  height: 100vh;\n  overflow: hidden;\n  background: var(--bg-teal);\n  perspective: 1600px;\n}\n.hero-nav {\n  position: absolute;\n  top: 0; left: 0; right: 0;\n  z-index: 50;\n  padding: 24px var(--pad-x);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n.hero-headline {\n  position: absolute;\n  left: var(--pad-x);\n  top: 50%;\n  transform: translateY(-50%);\n  max-width: 540px;\n  z-index: 20;\n}\n.hero-headline h1 {\n  font-family: var(--font-outfit);\n  font-size: clamp(44px, 6vw, 72px);\n  font-weight: 700;\n  line-height: 0.98;\n  letter-spacing: -0.035em;\n  color: var(--text-on-dark);\n  margin: 0;\n}\n.hero-headline h1 span { display: block; opacity: 0; }\n.hl-1 { animation: heroReveal20 0.8s cubic-bezier(0.22,1,0.36,1) 0.05s forwards; }\n.hl-2 { color: rgba(225,245,238,0.45); animation: heroReveal20 0.8s cubic-bezier(0.22,1,0.36,1) 0.12s forwards; }\n.hl-3 { color: var(--amber); animation: heroReveal20 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards; }\n.hero-sub {\n  font-family: var(--font-outfit);\n  font-size: 17px;\n  line-height: 1.6;\n  color: var(--text-on-dark-muted);\n  margin-top: 28px;\n  max-width: 440px;\n  opacity: 0;\n  animation: heroReveal20 0.8s cubic-bezier(0.22,1,0.36,1) 0.28s forwards;\n}\n.hero-ctas {\n  margin-top: 36px;\n  display: flex;\n  flex-wrap: wrap;\n  gap: 16px;\n  align-items: center;\n  opacity: 0;\n  animation: heroReveal20 0.8s cubic-bezier(0.22,1,0.36,1) 0.36s forwards;\n}\n.btn-primary {\n  background: var(--amber);\n  color: var(--amber-ink);\n  border: none;\n  padding: 16px 32px;\n  border-radius: 12px;\n  font-family: var(--font-outfit);\n  font-weight: 700;\n  font-size: 15px;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  text-decoration: none;\n  transition: transform 0.2s, filter 0.2s;\n}\n.btn-primary:hover { transform: translateY(-2px); filter: brightness(1.05); }\n.btn-ghost {\n  background: transparent;\n  color: var(--text-on-dark);\n  border: 1.5px solid rgba(225,245,238,0.25);\n  padding: 16px 28px;\n  border-radius: 12px;\n  font-family: var(--font-outfit);\n  font-weight: 600;\n  font-size: 15px;\n  cursor: pointer;\n  text-decoration: none;\n  transition: border-color 0.2s, background 0.2s;\n}\n.btn-ghost:hover { border-color: rgba(225,245,238,0.5); background: rgba(225,245,238,0.05); }\n\n.hero-stage {\n  position: absolute;\n  right: 0; top: 0; bottom: 0;\n  width: 50%;\n  transform: translateX(-15%);\n  transform-style: preserve-3d;\n  pointer-events: none;\n}\n\n/* mobile hero phone — hidden on desktop, shown under the headline on phones */\n.hero-mobile { display: none; }\n\n.scroll-hint {\n  position: absolute;\n  bottom: 32px;\n  left: 50%;\n  transform: translateX(-50%);\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: 0.25em;\n  text-transform: uppercase;\n  color: rgba(225,245,238,0.4);\n  pointer-events: none;\n}\n.scroll-hint .bar {\n  width: 1px; height: 24px;\n  background: rgba(232,160,32,0.5);\n  animation: scrollHint 1.6s ease-in-out infinite;\n}\n\n/* ============================================================\n   GENERIC SECTION HELPERS\n   ============================================================ */\n.section { padding: 96px var(--pad-x); position: relative; overflow: hidden; }\n.wrap { max-width: 1240px; margin: 0 auto; position: relative; }\n.center { text-align: center; }\n.h2 {\n  font-family: var(--font-outfit);\n  font-weight: 700;\n  line-height: 1.05;\n  letter-spacing: -0.035em;\n  margin: 0;\n}\n.lead {\n  font-size: 17px;\n  line-height: 1.6;\n  margin-top: 24px;\n  margin-left: auto;\n  margin-right: auto;\n}\n\n.reveal { opacity: 0; transform: translateY(40px); transition: all 0.95s cubic-bezier(0.22,1,0.36,1); }\n.reveal.in { opacity: 1; transform: translateY(0); }\n\n/* ---------- STORY ---------- */\n.story { background: var(--cream); }\n.story-layout {\n  max-width: 1240px; margin: 0 auto;\n  display: grid; grid-template-columns: 280px 1fr; gap: 80px;\n}\n.story-sticky { position: sticky; top: 80px; align-self: start; }\n.story-beats { display: flex; flex-direction: column; gap: 56px; }\n.beat {\n  display: grid;\n  grid-template-columns: 80px 1fr 280px;\n  gap: 32px;\n  align-items: start;\n}\n.beat-n {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  letter-spacing: 0.28em;\n  color: var(--amber-dark);\n  font-weight: 600;\n  padding-top: 8px;\n}\n.beat h3 {\n  font-family: var(--font-outfit);\n  font-size: 32px;\n  font-weight: 700;\n  line-height: 1.1;\n  letter-spacing: -0.025em;\n  color: var(--bg-teal);\n  margin: 0 0 14px;\n}\n.beat p {\n  font-size: 17px;\n  line-height: 1.65;\n  color: var(--subtle);\n  margin: 0;\n  max-width: 480px;\n}\n\n/* ---------- PRODUCT FEATURES ---------- */\n.feature { padding: 80px var(--pad-x); }\n.feature-grid {\n  max-width: 1240px; margin: 0 auto;\n  display: grid; grid-template-columns: 1fr 1fr; gap: 100px;\n  align-items: center;\n}\n.feature h3 {\n  font-family: var(--font-outfit);\n  font-size: 44px; font-weight: 700;\n  line-height: 1.05; letter-spacing: -0.03em;\n  margin: 0 0 24px;\n}\n.feature p.body {\n  font-size: 17px; line-height: 1.65; margin: 0 0 28px; max-width: 460px;\n}\n.feature ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }\n.feature li {\n  display: flex; align-items: flex-start; gap: 12px;\n  font-size: 15px; line-height: 1.5;\n}\n.tick {\n  flex-shrink: 0; margin-top: 2px;\n  width: 18px; height: 18px; border-radius: 5px;\n  color: var(--mint);\n  display: flex; align-items: center; justify-content: center;\n  font-size: 11px; font-weight: 700;\n}\n.feature-visual { display: flex; justify-content: center; }\n.feature-text.reveal-x { opacity: 0; transition: all 0.95s cubic-bezier(0.22,1,0.36,1); }\n.feature-text.from-left { transform: translateX(-40px); }\n.feature-text.from-right { transform: translateX(40px); }\n.feature-text.in { opacity: 1; transform: translateX(0); }\n.feature-visual.reveal-v { opacity: 0; transform: translateY(20px) scale(0.96); transition: all 1.1s cubic-bezier(0.22,1,0.36,1) 0.15s; }\n.feature-visual.in { opacity: 1; transform: translateY(0) scale(1); }\n\n/* ---------- PHONE FRAME ---------- */\n.phone {\n  background: var(--ink);\n  border-radius: 44px;\n  border: 3px solid #3a3a36;\n  padding: 8px;\n  width: 300px; height: 600px;\n  position: relative;\n  box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 80px rgba(232,160,32,0.12);\n}\n.phone .notch {\n  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);\n  width: 110px; height: 30px; background: #000; border-radius: 18px; z-index: 5;\n}\n.phone .screen {\n  width: 100%; height: 100%;\n  background: var(--cream);\n  border-radius: 36px;\n  overflow: hidden;\n  position: relative;\n}\n.statusbar {\n  position: absolute; top: 16px; left: 24px; right: 24px; z-index: 4;\n  display: flex; justify-content: space-between;\n  font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink);\n}\n.statusbar .right { display: flex; gap: 4px; font-size: 10px; }\n.screen-body { padding-top: 50px; height: 100%; overflow: hidden; }\n.eyebrow {\n  font-family: var(--font-mono); font-size: 9px;\n  letter-spacing: 0.2em; text-transform: uppercase; color: var(--subtle); margin-bottom: 4px;\n}\n.screen-title {\n  font-family: var(--font-outfit); font-weight: 700; font-size: 26px;\n  color: var(--bg-teal); letter-spacing: -0.02em;\n}\n.screen-meta { font-family: var(--font-outfit); font-size: 13px; color: var(--subtle); margin-top: 2px; }\n\n.chip-row { display: flex; gap: 6px; margin-top: 4px; }\n.chip {\n  font-family: var(--font-outfit); font-size: 11px; font-weight: 600;\n  padding: 5px 11px; border-radius: 999px;\n  background: transparent; color: var(--subtle); border: 1px solid var(--paper-border);\n}\n.chip.active { background: var(--bg-teal); color: var(--text-on-dark); border: none; }\n\n.row-card {\n  display: flex; align-items: center; gap: 10px;\n  padding: 10px 12px; background: var(--paper);\n  border-radius: 10px; border: 1px solid var(--paper-border);\n}\n.qty {\n  flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px;\n  background: var(--cream); display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-mono); font-size: 9px; color: var(--subtle); font-weight: 600;\n}\n.item-name { font-family: var(--font-hand); font-size: 17px; color: var(--ink); line-height: 1.1; }\n.tag {\n  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em;\n  text-transform: uppercase; padding: 4px 9px; border-radius: 999px; font-weight: 600;\n}\n.tag.good { background: rgba(29,158,117,0.18); color: var(--mint); }\n.tag.warn { background: rgba(232,160,32,0.20); color: var(--amber-dark); }\n.tag.bad  { background: rgba(163,45,45,0.18); color: var(--danger); }\n\n.aisle-label {\n  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em;\n  text-transform: uppercase; color: var(--amber-dark); font-weight: 600;\n  padding: 4px 8px; margin-bottom: 4px;\n}\n.checkbox {\n  width: 18px; height: 18px; flex-shrink: 0; border-radius: 5px;\n  display: flex; align-items: center; justify-content: center;\n  color: #fff; font-size: 11px; font-weight: 700;\n  border: 1.5px solid #d3c5a3; background: transparent;\n}\n.checkbox.checked { border: none; background: var(--mint); }\n.have-it {\n  font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.15em;\n  text-transform: uppercase; color: var(--subtle);\n}\n\n/* ---------- SAVINGS ---------- */\n.savings { background: var(--bg-deep); }\n.stat-grid {\n  display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;\n  background: rgba(225,245,238,0.08); border-radius: 24px; overflow: hidden;\n  border: 1px solid rgba(225,245,238,0.08);\n}\n.stat { background: var(--bg-teal); padding: 60px 40px; }\n.stat .value {\n  font-family: var(--font-outfit); font-size: 88px; font-weight: 700;\n  line-height: 1; letter-spacing: -0.04em; color: var(--amber); margin-bottom: 20px;\n}\n.stat .label {\n  font-family: var(--font-outfit); font-weight: 600; font-size: 18px;\n  color: var(--text-on-dark); margin-bottom: 8px; letter-spacing: -0.01em;\n}\n.stat .sub { font-size: 14px; line-height: 1.5; color: rgba(225,245,238,0.55); }\n\n/* ---------- TESTIMONIALS ---------- */\n.testimonials { background: var(--cream); }\n.quote-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; }\n.quote-card {\n  background: var(--paper);\n  padding: 40px 36px;\n  box-shadow: 0 24px 40px -12px rgba(4,52,44,0.15), 0 8px 16px rgba(4,52,44,0.08);\n  background-image: repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(4,52,44,0.05) 31px, rgba(4,52,44,0.05) 32px);\n  position: relative;\n  opacity: 0;\n  transition: all 0.95s cubic-bezier(0.22,1,0.36,1);\n}\n.quote-card .tape {\n  position: absolute; top: -10px; left: 50%;\n  transform: translateX(-50%) rotate(-3deg);\n  width: 70px; height: 22px; background: rgba(232,160,32,0.4);\n}\n.quote-text { font-family: var(--font-hand); font-size: 24px; line-height: 1.5; color: var(--ink); margin-bottom: 24px; }\n.quote-foot { display: flex; align-items: center; gap: 12px; padding-top: 16px; border-top: 1px solid rgba(4,52,44,0.1); }\n.avatar {\n  width: 36px; height: 36px; border-radius: 50%;\n  background: var(--bg-teal); color: var(--text-on-dark);\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--font-outfit); font-weight: 700; font-size: 14px;\n}\n.quote-name { font-family: var(--font-outfit); font-weight: 600; font-size: 14px; color: var(--bg-teal); letter-spacing: -0.01em; }\n.quote-role { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--subtle); margin-top: 2px; }\n\n/* ---------- PRICING ---------- */\n.pricing { background: var(--cream); }\n.pricing-blob1 { position: absolute; top: 12%; left: -8%; width: 320px; height: 320px; border-radius: 50%; background: rgba(29,158,117,0.08); pointer-events: none; }\n.pricing-blob2 { position: absolute; bottom: 8%; right: -6%; width: 280px; height: 280px; border-radius: 50%; background: rgba(232,160,32,0.1); pointer-events: none; }\n.pricing-cards {\n  display: flex; flex-wrap: wrap; gap: 40px;\n  align-items: flex-end; justify-content: center; padding-top: 16px;\n}\n.tier { position: relative; flex: 1 1 340px; max-width: 400px; transition: transform 0.4s cubic-bezier(0.22,1,0.36,1); }\n.tier .tape {\n  position: absolute; top: -10px; left: 50%;\n  transform: translateX(-50%) rotate(-1deg);
